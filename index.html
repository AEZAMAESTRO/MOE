<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOE Interactive Dashboard</title>
    <style>
        :root {
            --primary-color: #0078d4; /* MOE Blue */
            --bg-color: #f3f2f1;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        /* Responsive Layout for Inputs */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        /* The Chart */
        .chart-container {
            margin-top: 20px;
        }

        .bar-wrapper {
            margin-bottom: 15px;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .bar-background {
            background: #eee;
            height: 25px;
            border-radius: 12px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.8s ease-in-out;
        }

        /* Mobile Specific Fixes */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ministry of Education Performance</h1>
    
    <div class="input-grid">
        <div class="input-group">
            <label>Region A</label>
            <input type="number" id="val1" value="70" oninput="updateChart()">
        </div>
        <div class="input-group">
            <label>Region B</label>
            <input type="number" id="val2" value="45" oninput="updateChart()">
        </div>
        <div class="input-group">
            <label>Region C</label>
            <input type="number" id="val3" value="90" oninput="updateChart()">
        </div>
    </div>

    <div class="chart-container" id="chart">
        </div>
</div>

<script>
    function updateChart() {
        const data = [
            { name: "Region A", val: document.getElementById('val1').value },
            { name: "Region B", val: document.getElementById('val2').value },
            { name: "Region C", val: document.getElementById('val3').value }
        ];

        const chart = document.getElementById('chart');
        chart.innerHTML = '';

        // Sort data so the highest is always at the top
        data.sort((a, b) => b.val - a.val);

        data.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'bar-wrapper';
            
            // Limit percentage to 100 max
            const displayVal = Math.min(Math.max(item.val, 0), 100);

            wrapper.innerHTML = `
                <div class="bar-label">
                    <span>${item.name}</span>
                    <span>${displayVal}%</span>
                </div>
                <div class="bar-background">
                    <div class="bar-fill" style="width: ${displayVal}%"></div>
                </div>
            `;
            chart.appendChild(wrapper);
        });
    }

    // Initialize chart on load
    updateChart();
</script>

</body>
</html>
